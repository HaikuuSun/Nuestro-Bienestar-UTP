version: '3.9'

services:
  db:
    image: mysql:8.1
    container_name: nuestro_bienestar_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-nuestro_bienestar}
      MYSQL_USER: ${DB_USER:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: nuestro_bienestar_backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      NODE_ENV: development
      API_PORT: ${API_PORT:-5000}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-nuestro_bienestar}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200,http://localhost:3000}
    volumes:
      - ./back-end:/usr/src/app
    command: npm run dev

volumes:
  db_data:
    name: nuestro_bienestar_db_data
