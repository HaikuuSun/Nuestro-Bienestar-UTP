<section class="login-panel">
  <h2>Iniciar sesión</h2>
  <p>Usa tu cuenta institucional @utp.edu.co para acceder a la plataforma.</p>

  <form (ngSubmit)="login()" #loginForm="ngForm" autocomplete="off">
    <label for="email">Correo</label>
    <input
      id="email"
      name="email"
      type="email"
      [(ngModel)]="email"
      required
      placeholder="usuario@utp.edu.co"
    />

    <label for="password">Contraseña</label>
    <input
      id="password"
      name="password"
      type="password"
      [(ngModel)]="password"
      required
      minlength="6"
      placeholder="******"
    />

    <button type="submit" [disabled]="loading">{{ loading ? 'Validando...' : 'Iniciar sesión' }}</button>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </form>
</section>
