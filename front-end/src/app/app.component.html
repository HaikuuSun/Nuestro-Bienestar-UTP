<header class="navbar">
  <div class="brand">
    <img src="assets/utp-logo.svg" alt="UTP Logo" class="logo" />
    <div class="brand-text">
      <span class="brand-title">Nuestro Bienestar</span>
      <span class="brand-subtitle">UTP - Plataforma administrativa</span>
    </div>
  </div>

  <nav class="nav-links">
    <a routerLink="/home" routerLinkActive="active">Inicio</a>
    <a routerLink="/categorias" routerLinkActive="active">Categorías</a>
    <a routerLink="/convenios" routerLinkActive="active">Convenios</a>
    <a routerLink="/perfil" routerLinkActive="active">Perfil</a>
    <a routerLink="/notificaciones" routerLinkActive="active">Notificaciones</a>
    <a routerLink="/registro" routerLinkActive="active" *ngIf="showRegisterLink()">Registrar usuarios</a>
    <a routerLink="/about" routerLinkActive="active">Acerca</a>
  </nav>

  <button class="logout" *ngIf="isAuthenticated()" (click)="logout()">Cerrar sesión</button>
</header>

<main class="content">
  <router-outlet></router-outlet>
</main>
